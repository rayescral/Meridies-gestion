<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MERIDIES — Gestion Centralisée</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --noir:#12192B;--noir2:#1A2235;--noir3:#222D42;
  --gold:#C9A84C;--gold-dim:rgba(201,168,76,0.15);--gold-text:rgba(201,168,76,0.7);
  --surface:#FFFFFF;--surface2:#F7F8FA;--surface3:#EEF0F4;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --text:#12192B;--muted:#6B7280;--hint:#9CA3AF;
  --success:#059669;--success-bg:#ECFDF5;
  --warning:#D97706;--warning-bg:#FFFBEB;
  --danger:#DC2626;--danger-bg:#FEF2F2;
  --info:#2563EB;--info-bg:#EFF6FF;
  --r:10px;--r-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
}
body{font-family:'DM Sans',system-ui,sans-serif;background:#F0F1F5;color:var(--text);min-height:100vh;}

/* --- FIX ALIGNEMENT --- */
.layout{display:flex; min-height:100vh;}
.sidebar{
    width:240px; 
    background:var(--noir); 
    display:flex; 
    flex-direction:column; 
    position:fixed; 
    top:0; left:0; bottom:0; 
    z-index:100;
}
.main{
    margin-left:240px; /* Important pour que le contenu ne soit pas SOUS la barre */
    flex:1; 
    display:flex; 
    flex-direction:column;
    min-width: 0;
}
/* ---------------------- */

.sidebar-brand{padding:24px 20px; border-bottom:1px solid rgba(255,255,255,0.06);}
.sidebar-brand h1{font-size:18px; font-weight:700; color:var(--gold); letter-spacing:.12em;}
.sidebar-nav{flex:1; padding:12px 10px; overflow-y:auto;}
.nav-section{font-size:9px; font-weight:700; color:rgba(255,255,255,0.25); text-transform:uppercase; letter-spacing:.12em; padding:16px 12px 8px;}
.nav-item{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; cursor:pointer; color:rgba(255,255,255,0.55); font-size:13px; font-weight:500; margin-bottom:2px; transition:0.2s;}
.nav-item:hover{background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.85);}
.nav-item.active{background:var(--gold-dim); color:var(--gold); font-weight:600;}

.topbar{display:flex; align-items:center; justify-content:space-between; padding:16px 28px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50;}
.content{padding:28px; max-width:1400px; width:100%; margin:0 auto;}

/* STYLE CALENDRIER */
.calendar-grid{display:grid; grid-template-columns:repeat(7, 1fr); gap:1px; background:var(--border); border:1px solid var(--border); border-radius:var(--r); overflow:hidden;}
.calendar-day-head{background:var(--surface2); padding:12px; text-align:center; font-size:11px; font-weight:700; color:var(--muted);}
.calendar-day{background:var(--surface); min-height:110px; padding:10px; position:relative; transition: 0.2s;}
.calendar-day:hover{background:var(--surface2);}
.calendar-day-num{font-size:12px; font-weight:700; margin-bottom:8px; display:block;}
.calendar-day.today{background:var(--gold-dim);}
.calendar-event{font-size:10px; padding:4px 8px; border-radius:4px; margin-bottom:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:600;}
.ev-bc{background:var(--info-bg); color:var(--info); border-left:3px solid var(--info);}
.ev-todo{background:var(--warning-bg); color:var(--warning); border-left:3px solid var(--warning);}

.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--r-lg); padding:24px; margin-bottom:24px; box-shadow:var(--shadow);}
.page{display:none;}
.page.active{display:block;}

#lock-screen{position:fixed; inset:0; background:var(--noir); z-index:9999; display:flex; align-items:center; justify-content:center;}
</style>
</head>
<body onclick="resetInactivity()" onkeydown="resetInactivity()">

<div id="lock-screen">
  <div style="background:var(--noir2); border:1px solid rgba(201,168,76,0.2); border-radius:20px; padding:48px; width:380px; text-align:center;">
    <div style="font-size:32px; font-weight:700; color:var(--gold); margin-bottom:32px; letter-spacing:.2em;">MERIDIES</div>
    <input type="password" id="lock-input" class="input" placeholder="Mot de passe" style="width:100%; padding:12px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:#12192B; color:white; text-align:center; margin-bottom:20px;" onkeydown="if(event.key==='Enter')lockSubmit()">
    <div id="lock-error" style="color:var(--danger); font-size:12px; margin-bottom:15px; height:15px;"></div>
    <button onclick="lockSubmit()" style="width:100%; padding:12px; background:var(--gold); color:var(--noir); border:none; border-radius:8px; font-weight:bold; cursor:pointer;">ACCÉDER</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-brand"><h1>MERIDIES</h1></div>
    <nav class="sidebar-nav">
      <div class="nav-section">Général</div>
      <div class="nav-item active" onclick="goTo('dashboard')">📊 Dashboard</div>
      <div class="nav-item" onclick="goTo('calendar')">📅 Calendrier / Planning</div>
      
      <div class="nav-section">Stocks</div>
      <div class="nav-item" onclick="goTo('stock-vierge')">👕 T-shirts Vierges</div>
      <div class="nav-item" onclick="goTo('stock-dtf')">🎨 Designs DTF</div>
      <div class="nav-item" onclick="goTo('stock-fini')">✅ Produits Finis</div>

      <div class="nav-section">Back-Office</div>
      <div class="nav-item" onclick="goTo('commandes')">📋 Bons de Commande</div>
      <div class="nav-item" onclick="goTo('fournisseurs')">🏭 Fournisseurs</div>
      <div class="nav-item" onclick="goTo('todo')">✏️ Tâches (Todos)</div>
    </nav>
  </div>

  <div class="main">
    <div class="topbar">
        <div id="page-title" style="font-weight:700; font-size:18px;">Dashboard</div>
        <button onclick="saveDB()" style="padding:8px 16px; background:var(--gold); color:var(--noir); border:none; border-radius:6px; font-weight:600; cursor:pointer;">💾 Sauvegarder</button>
    </div>

    <div class="content">
      <div class="page active" id="page-dashboard">
          <div id="dash-kpis" style="display:grid; grid-template-columns:repeat(4,1fr); gap:20px;"></div>
      </div>

      <div class="page" id="page-calendar">
          <div class="card">
              <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                  <h2 id="calendar-month-year" style="font-size:18px;"></h2>
                  <div>
                      <button onclick="changeMonth(-1)" style="padding:5px 12px; cursor:pointer;">‹</button>
                      <button onclick="changeMonth(1)" style="padding:5px 12px; cursor:pointer;">›</button>
                  </div>
              </div>
              <div class="calendar-grid" id="calendar-grid"></div>
          </div>
      </div>

      <div class="page" id="page-stock-vierge">
          <div class="card"><h2>Gestion T-shirts Vierges</h2><div id="vierge-list"></div></div>
      </div>
      <div class="page" id="page-stock-dtf">
          <div class="card"><h2>Gestion Designs DTF</h2><div id="dtf-list"></div></div>
      </div>
      <div class="page" id="page-stock-fini">
          <div class="card"><h2>Stocks Produits Finis</h2><div id="fini-list"></div></div>
      </div>

      <div class="page" id="page-commandes">
          <div class="card"><h2>Bons de Commande</h2><div id="order-list"></div></div>
      </div>

      <div class="page" id="page-todo">
          <div class="card"><h2>Tâches</h2><div id="todo-list"></div></div>
      </div>

    </div>
  </div>
</div>

<script>
// --- TA CONFIGURATION (On ne touche à rien) ---
const SUPA_URL = 'https://twsuchpzsytlourrjjgg.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Ta clé
const _supabase = supabase.createClient(SUPA_URL, SUPA_KEY);

let DB = {
    stockVierge: [],
    stockDTF: [],
    stockFini: [],
    bonsCommande: [],
    fournisseurs: [],
    todos: []
};

// --- LOGIQUE NAVIGATION ---
function goTo(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    document.getElementById('page-' + pageId).classList.add('active');
    const navItem = document.querySelector(`[onclick="goTo('${pageId}')"]`);
    if(navItem) navItem.classList.add('active');
    document.getElementById('page-title').textContent = navItem ? navItem.textContent : "Gestion";

    if(pageId === 'calendar') renderCalendar();
}

// --- LOGIQUE CALENDRIER ---
let currentCalDate = new Date();

function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    const title = document.getElementById('calendar-month-year');
    const year = currentCalDate.getFullYear();
    const month = currentCalDate.getMonth();
    
    const monthNames = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
    title.textContent = monthNames[month] + " " + year;

    grid.innerHTML = ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'].map(day => 
        `<div class="calendar-day-head">${day}</div>`
    ).join('');

    const firstDay = new Date(year, month, 1).getDay();
    const offset = firstDay === 0 ? 6 : firstDay - 1;
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // Cases vides avant
    for (let i = 0; i < offset; i++) {
        grid.innerHTML += `<div class="calendar-day" style="background:var(--surface3); opacity:0.3;"></div>`;
    }

    // Jours du mois
    for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        let eventsHtml = "";

        // Récupérer les BC
        DB.bonsCommande.filter(bc => bc.date === dateStr).forEach(bc => {
            eventsHtml += `<div class="calendar-event ev-bc">📦 BC #${bc.id || 'N/A'}</div>`;
        });

        // Récupérer les Todos
        DB.todos.filter(t => t.echeance === dateStr).forEach(t => {
            eventsHtml += `<div class="calendar-event ev-todo">✏️ ${t.tache}</div>`;
        });

        const isToday = new Date().toISOString().split('T')[0] === dateStr ? 'today' : '';
        grid.innerHTML += `
            <div class="calendar-day ${isToday}">
                <span class="calendar-day-num">${d}</span>
                ${eventsHtml}
            </div>
        `;
    }
}

function changeMonth(dir) {
    currentCalDate.setMonth(currentCalDate.getMonth() + dir);
    renderCalendar();
}

// --- SECURITE / LOCK ---
const DEFAULT_PWD = 'UmF5ZXNGcm9tU3BhY2UxMDopOm1lcmlkaWVz';
function lockSubmit() {
    const val = document.getElementById('lock-input').value;
    if(btoa(val + ':meridies') === DEFAULT_PWD) {
        sessionStorage.setItem('meridies_authed', '1');
        document.getElementById('lock-screen').style.display = 'none';
        loadDB();
    } else {
        document.getElementById('lock-error').textContent = "Accès refusé.";
    }
}

// --- TES FONCTIONS DE CHARGEMENT / SAUVEGARDE (A conserver intactes) ---
async function loadDB() {
    // Ici tu colles ta fonction loadDB() de ton fichier index (2).html
    console.log("DB Chargée");
}

async function saveDB() {
    // Ici tu colles ta fonction saveDB() de ton fichier index (2).html
    alert("Données sauvegardées sur Supabase");
}

function resetInactivity() { /* Ton timer */ }

// Initialisation au chargement si déjà auth
if(sessionStorage.getItem('meridies_authed') === '1') {
    document.getElementById('lock-screen').style.display = 'none';
    loadDB();
}
</script>
</body>
</html>
